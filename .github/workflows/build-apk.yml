name: Compilar APK de Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependencias
        run: npm install

      - name: Compilar la web
        run: npm run build

      - name: Sincronizar con Android
        run: npx cap sync android

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk finanzas.apk

      - name: Publicar release con el APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Mis Finanzas v1.0.${{ github.run_number }}
          files: finanzas.apk
          body: "APK de Mis Finanzas. Descárgalo en tu Android y ábrelo para instalar."
